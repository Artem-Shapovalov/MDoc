name: build-windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  PLANTUML_VERSION: "1.2025.2"
  DEJAVU_VERSION: "2.37"

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: MDoc_win_x86_64
            runs_on: windows-2025
            archive_name: MDoc_win_x86_64.zip
          - target: MDoc_win_arm
            runs_on: windows-11-arm
            archive_name: MDoc_win_arm.zip

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller
      - name: Install Graphviz and Java
        shell: pwsh
        run: |
          choco install graphviz -y
          choco install microsoft-openjdk --version=21.0.7 -y
      - name: Download PlantUML jar
        shell: bash
        run: |
          mkdir -p third_party/plantuml
          curl -fsSL -o third_party/plantuml/plantuml.jar             "https://github.com/plantuml/plantuml/releases/download/v${PLANTUML_VERSION}/plantuml-${PLANTUML_VERSION}.jar"
      - name: Download DejaVu fonts
        shell: bash
        run: |
          mkdir -p third_party/fonts
          curl -fsSL -o /tmp/dejavu-fonts.tar.bz2             "https://downloads.sourceforge.net/project/dejavu/dejavu/${DEJAVU_VERSION}/dejavu-fonts-ttf-${DEJAVU_VERSION}.tar.bz2"
          tar -xjf /tmp/dejavu-fonts.tar.bz2 -C /tmp
          find /tmp/dejavu-fonts-ttf-${DEJAVU_VERSION} -maxdepth 1 -type f \( -name 'DejaVuSans*.ttf' -o -name 'DejaVuSansMono*.ttf' \) -exec cp {} third_party/fonts/ \;
      - name: Resolve tool paths
        shell: pwsh
        run: |
          $dotCommand = Get-Command dot.exe -All |
            Where-Object { $_.Source -match '\\Graphviz\\bin\\dot\.exe$' } |
            Select-Object -First 1
          if (-not $dotCommand) {
            $dotCommand = Get-Command dot.exe -All |
              Where-Object { $_.Source -notmatch '\\chocolatey\\bin\\' } |
              Select-Object -First 1
          }
          if (-not $dotCommand) {
            $dotCandidate = Join-Path $env:ProgramFiles "Graphviz\bin\dot.exe"
            if (Test-Path $dotCandidate) {
              $dot = $dotCandidate
            }
          }
          if (-not $dotCommand) {
            if (-not $dot) {
              throw "Could not resolve the real Graphviz dot.exe; refusing to bundle a Chocolatey shim."
            }
          } else {
            $dot = $dotCommand.Source
          }
          $java = (Get-Command java).Source
          "GRAPHVIZ_DOT=$dot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "JAVA_BIN=$java" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build PyInstaller one-directory bundle
        shell: bash
        run: pyinstaller --noconfirm --clean mdoc.spec
      - name: Prune bundle
        shell: bash
        run: python scripts/ci/prune_bundle.py
      - name: Copy bundled runtime payload
        shell: bash
        run: python scripts/ci/postbuild_bundle.py
      - name: Smoke test bundle
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/MDoc/MDoc.exe")) { throw "dist/MDoc/MDoc.exe was not produced" }
          if (-not (Test-Path "dist/MDoc/runtime/graphviz/bin/dot.exe")) { throw "Bundled Graphviz dot.exe was not produced" }
          $smokeMarkdown = Join-Path $env:RUNNER_TEMP "mdoc-graphviz-smoke.md"
          $smokePdf = Join-Path $env:RUNNER_TEMP "mdoc-graphviz-smoke.pdf"
          Remove-Item -Force -ErrorAction SilentlyContinue $smokePdf
          @"
          ```graphviz
          digraph G { a -> b }
          ```
          "@ | Out-File -FilePath $smokeMarkdown -Encoding utf8
          $mdocExe = Resolve-Path "dist/MDoc/MDoc.exe"
          $proc = Start-Process -FilePath $mdocExe -ArgumentList @("--export-pdf", $smokeMarkdown, "-o", $smokePdf) -Wait -PassThru
          if ($proc.ExitCode -ne 0) { throw "Graphviz smoke export failed with exit code $($proc.ExitCode)" }
          for ($i = 0; $i -lt 20 -and -not (Test-Path $smokePdf); $i++) {
            Start-Sleep -Milliseconds 250
          }
          if (-not (Test-Path $smokePdf)) { throw "Graphviz smoke PDF was not produced at $smokePdf" }
          if ((Get-Item $smokePdf).Length -le 0) { throw "Graphviz smoke PDF is empty: $smokePdf" }
      - name: Archive bundle
        shell: pwsh
        run: Compress-Archive -Path "dist/MDoc/*" -DestinationPath "${{ matrix.archive_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.archive_name }}
      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
