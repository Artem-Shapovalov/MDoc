name: build-and-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  PLANTUML_VERSION: "1.2025.2"
  DEJAVU_VERSION: "2.37"

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: MDoc_win_x86_64
            runs_on: windows-2025
            bundle_dir: dist/MDoc
            archive_name: MDoc_win_x86_64.zip
          - target: MDoc_win_arm
            runs_on: windows-11-arm
            bundle_dir: dist/MDoc
            archive_name: MDoc_win_arm.zip
          - target: MDoc_lin_x86_64
            runs_on: ubuntu-24.04
            bundle_dir: dist/MDoc
            archive_name: MDoc_lin_x86_64.tar.gz
          - target: MDoc_lin_arm
            runs_on: ubuntu-24.04-arm
            bundle_dir: dist/MDoc
            archive_name: MDoc_lin_arm.tar.gz
          - target: MDoc_mac_x86_64
            runs_on: macos-15-intel
            bundle_dir: dist/MDoc.app
            archive_name: MDoc_mac_x86_64.tar.gz
          - target: MDoc_mac_m2
            runs_on: macos-15
            bundle_dir: dist/MDoc.app
            archive_name: MDoc_mac_m2.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Install Graphviz and Java on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz default-jre-headless curl unzip

      - name: Install Graphviz and Java on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install graphviz -y
          choco install microsoft-openjdk --version=21.0.7 -y

      - name: Install Graphviz and Java on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew update
          brew install graphviz openjdk@21

      - name: Download PlantUML jar
        shell: bash
        run: |
          mkdir -p third_party/plantuml
          curl -fsSL -o third_party/plantuml/plantuml.jar \
            "https://github.com/plantuml/plantuml/releases/download/v${PLANTUML_VERSION}/plantuml-${PLANTUML_VERSION}.jar"

      - name: Download DejaVu fonts
        shell: bash
        run: |
          mkdir -p third_party/fonts
          curl -fsSL -o /tmp/dejavu-fonts.tar.bz2 \
            "https://downloads.sourceforge.net/project/dejavu/dejavu/${DEJAVU_VERSION}/dejavu-fonts-ttf-${DEJAVU_VERSION}.tar.bz2"
          tar -xjf /tmp/dejavu-fonts.tar.bz2 -C /tmp
          find /tmp/dejavu-fonts-ttf-${DEJAVU_VERSION} -maxdepth 1 -type f \( -name 'DejaVuSans*.ttf' -o -name 'DejaVuSansMono*.ttf' \) -exec cp {} third_party/fonts/ \;

      - name: Resolve tool paths on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          {
            echo "GRAPHVIZ_DOT=$(command -v dot)"
            echo "JAVA_BIN=$(command -v java)"
          } >> "$GITHUB_ENV"

      - name: Resolve tool paths on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dot = (Get-Command dot).Source
          $java = (Get-Command java).Source
          "GRAPHVIZ_DOT=$dot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "JAVA_BIN=$java" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build PyInstaller one-directory bundle
        shell: bash
        run: |
          pyinstaller --noconfirm --clean mdoc.spec

      - name: Copy bundled runtime payload
        shell: bash
        run: |
          python scripts/ci/postbuild_bundle.py

      - name: Smoke test bundle on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ -d dist/MDoc.app ]; then
            test -x dist/MDoc.app/Contents/MacOS/MDoc
          else
            test -x dist/MDoc/MDoc
          fi

      - name: Smoke test bundle on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/MDoc/MDoc.exe")) { throw "dist/MDoc/MDoc.exe was not produced" }

      - name: Archive Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ matrix.bundle_dir }}\*" -DestinationPath "${{ matrix.archive_name }}"

      - name: Archive Linux or macOS bundle
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tar -czf "${{ matrix.archive_name }}" -C dist "$(basename '${{ matrix.bundle_dir }}')"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.archive_name }}

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
